<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#f2f2f2;color:#1a1a1a;min-height:100vh}

    #pw-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1a1a1a}
    .pw-box{background:white;border-radius:20px;padding:52px 44px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .pw-logo{color:#FF6600;font-size:22px;font-weight:900;margin-bottom:6px}
    .pw-sub{color:#aaa;font-size:13px;margin-bottom:36px}
    .pw-input{width:100%;border:2px solid #e8e8e8;border-radius:10px;padding:14px;font-size:26px;letter-spacing:10px;text-align:center;outline:none;font-family:inherit;transition:border-color .2s}
    .pw-input:focus{border-color:#FF6600}
    .pw-btn{width:100%;margin-top:14px;background:#FF6600;color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    .pw-btn:hover{background:#e05a00}
    .pw-err{color:#e53e3e;font-size:13px;margin-top:10px;height:18px}

    #admin{display:none}
    .adm-nav{background:#1a1a1a;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;position:sticky;top:0;z-index:100}
    .adm-logo{color:#FF6600;font-weight:900;font-size:15px}
    .nav-tabs{display:flex;gap:4px}
    .nav-tab{background:none;border:none;color:#666;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit}
    .nav-tab.active,.nav-tab:hover{background:#333;color:white}
    .adm-logout{background:none;border:none;color:#555;font-size:12px;cursor:pointer;font-family:inherit}
    .adm-logout:hover{color:white}

    .adm-body{max-width:980px;margin:0 auto;padding:36px 24px}
    .panel{display:none}.panel.active{display:block}
    .sec-title{font-size:17px;font-weight:900;margin-bottom:18px;display:flex;align-items:center;gap:10px}
    .cnt-badge{font-size:12px;font-weight:500;color:#999;background:#eee;padding:2px 10px;border-radius:999px}

    .card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:14px}
    .cat-hd{display:flex;align-items:center;gap:12px;padding:18px 24px;cursor:pointer;user-select:none}
    .cat-hd:hover{background:#fafafa}
    .cat-nm{font-size:14px;font-weight:700;flex:1}
    .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
    .badge-ok{background:#e6f4ea;color:#1a7a3b}
    .badge-no{background:#fff0f0;color:#c53030}
    .badge-chk{background:#f0f0f0;color:#999}
    .cat-arrow{font-size:11px;color:#ccc;transition:transform .2s}
    .card.open .cat-arrow{transform:rotate(180deg)}
    .cat-body{display:none;border-top:1px solid #f0f0f0;padding:22px 24px 24px}
    .card.open .cat-body{display:block}

    .grp-lbl{font-size:10px;font-weight:700;color:#bbb;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;margin-top:16px}
    .grp-lbl:first-child{margin-top:0}
    .tog-rows{display:flex;flex-direction:column;gap:7px}
    .tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f7f7f7;border-radius:8px}
    .tog-row.header-row{background:#fff3ec;border:1px solid #ffe0cc}
    .tog-nm{font-size:13px;font-weight:500}
    .switch{position:relative;width:40px;height:22px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .sw-sl{position:absolute;inset:0;background:#ddd;border-radius:999px;cursor:pointer;transition:.2s}
    .sw-sl:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
    .switch input:checked+.sw-sl{background:#FF6600}
    .switch input:checked+.sw-sl:before{transform:translateX(18px)}
    .save-row{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
    .save-btn{background:#FF6600;color:white;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .save-btn:hover{background:#e05a00}
    .saved-msg{font-size:12px;color:#1a7a3b;display:none}
    .del-btn{background:none;border:1px solid #eee;color:#ccc;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit}
    .del-btn:hover{border-color:#f0a0a0;color:#c53030}
    .update-btn{background:#1a1a1a;color:white;border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    .update-btn:hover{background:#333}
    .update-btn:disabled{background:#ccc;cursor:not-allowed}
    .update-log{font-size:11px;color:#888;margin-top:8px;padding:8px 12px;background:#f7f7f7;border-radius:6px;display:none;word-break:break-all}
    .preview-a{font-size:11px;color:#FF6600;text-decoration:none}
    .preview-a:hover{text-decoration:underline}
    .add-row{display:flex;gap:10px;margin-top:14px}
    .add-inp{flex:1;border:2px solid #e8e8e8;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit}
    .add-inp:focus{border-color:#FF6600}
    .add-btn{background:#1a1a1a;color:white;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .add-btn:hover{background:#333}

    .txt-field{background:white;border-radius:12px;padding:20px 24px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .txt-lbl{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
    .txt-inp{width:100%;border:2px solid #e8e8e8;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit;resize:vertical}
    .txt-inp:focus{border-color:#FF6600}
    .txt-default{font-size:11px;color:#ccc;margin-top:4px}
    .txt-save-row{margin-top:20px;display:flex;align-items:center;gap:12px}

    .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
    .tb-btn{background:#1a1a1a;color:white;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .tb-btn:hover{background:#333}
    .tb-btn:disabled{background:#ccc;cursor:not-allowed}
    .tb-btn.orange{background:#FF6600}
    .tb-btn.orange:hover{background:#e05a00}
    .filter-sel{border:2px solid #e8e8e8;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;background:white}
    .status-txt{font-size:13px;color:#888}
    .filter-area{background:white;border-radius:12px;padding:18px 20px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    .filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .filter-row+.filter-row{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0}
    .filter-label{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;min-width:60px}
    .fchip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;border:2px solid #e8e8e8;background:white;color:#888;cursor:pointer;transition:.15s;user-select:none}
    .fchip:hover{border-color:#ccc;color:#555}
    .fchip.on{background:#FF6600;border-color:#FF6600;color:white}
    .fchip .cnt{font-size:10px;opacity:.75}
    .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
    .quick-btn{background:none;border:1.5px solid #e8e8e8;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:#888;cursor:pointer;font-family:inherit;transition:.15s}
    .quick-btn:hover{border-color:#FF6600;color:#FF6600}
    .quick-btn.accent{border-color:#1a7a3b;color:#1a7a3b}
    .quick-btn.accent:hover{background:#1a7a3b;color:white}

    .lead-table-wrap{border-radius:12px;overflow:hidden;background:white;box-shadow:0 1px 8px rgba(0,0,0,.07)}
    table.leads{width:100%;border-collapse:collapse;min-width:700px}
    .leads thead tr{background:#1a1a1a}
    .leads thead th{padding:12px 16px;font-size:12px;font-weight:700;color:white;text-align:left;white-space:nowrap}
    .leads thead th:first-child{width:36px;text-align:center}
    .leads tbody tr{border-bottom:1px solid #f0f0f0}
    .leads tbody tr:last-child{border-bottom:none}
    .leads tbody tr:hover{background:#fafafa}
    .leads td{padding:12px 16px;font-size:13px;vertical-align:middle}
    .leads td:first-child{text-align:center}
    .sent-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px}
    .sent-y{background:#e6f4ea;color:#1a7a3b}
    .sent-n{background:#f0f0f0;color:#999}
    .cat-chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:#FFF0E8;color:#FF6600}

    #review-screen{display:none;position:fixed;inset:0;background:#f2f2f2;z-index:200;overflow-y:auto;padding-bottom:80px}
    .review-nav{background:#1a1a1a;height:56px;display:flex;align-items:center;padding:0 36px;gap:16px;position:sticky;top:0;z-index:10}
    .review-body{max-width:900px;margin:0 auto;padding:28px 24px}
    .review-card{background:white;border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
    .review-card-hd{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
    .review-card-hd:hover{background:#fafafa}
    .review-card-idx{font-size:12px;font-weight:700;color:#bbb;min-width:22px}
    .review-card-co{font-size:14px;font-weight:700;flex:1}
    .review-card-email{font-size:12px;color:#FF6600}
    .review-card.open .rv-arrow{transform:rotate(180deg)}
    .rv-arrow{font-size:11px;color:#ccc;transition:transform .2s}
    .review-card-body{display:none;border-top:1px solid #f0f0f0;padding:20px}
    .review-card.open .review-card-body{display:block}
    .rf-row{margin-bottom:14px}
    .rf-lbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
    .rf-val{font-size:13px;color:#333;line-height:1.5}
    .rf-val.subj{font-weight:700;font-size:14px;color:#1a1a1a}
    .rf-val.link{color:#FF6600;word-break:break-all;font-size:12px}
    .editor-toolbar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
    .editor-toolbar button{background:#f0f0f0;border:none;border-radius:5px;width:28px;height:28px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
    .editor-toolbar button:hover{background:#e0e0e0}
    .editor-toolbar button.link-btn{width:auto;padding:0 10px;font-size:11px;color:#FF6600;background:#FFF0E8}
    .editor-toolbar button.link-btn:hover{background:#FFE0CC}
    .common-panel{background:white;border-radius:14px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden}
    .common-panel-hd{padding:14px 20px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
    .common-panel-hd:hover{background:#fafafa}
    .common-panel-hd .badge-opt{font-size:10px;font-weight:500;color:#aaa;background:#f0f0f0;padding:2px 8px;border-radius:999px}
    .common-panel-body{display:none;border-top:1px solid #f0f0f0;padding:18px 20px}
    .common-panel.open .common-panel-body{display:block}
    .common-panel.open .cp-arrow{transform:rotate(180deg)}
    .cp-arrow{font-size:11px;color:#ccc;transition:transform .2s;margin-left:auto}
    .attach-row{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;flex-wrap:wrap}
    .attach-lbl{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase}
    .attach-input{display:none}
    .attach-trigger{background:#f0f0f0;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
    .attach-trigger:hover{background:#e0e0e0}
    .attach-name{font-size:12px;color:#555;flex:1}
    .attach-clear{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 4px}
    .attach-clear:hover{color:#c53030}
    .email-editor{font-size:13px;color:#333;line-height:1.75;border:1.5px solid #e8e8e8;border-radius:8px;padding:14px 16px;background:white;min-height:260px;max-height:360px;overflow-y:auto;outline:none;cursor:text}
    .email-editor:focus{border-color:#FF6600}
    .email-editor p,.email-editor div,.email-editor span,.email-editor li{font-size:13px}
    .email-editor p{margin-bottom:12px}
    .email-editor p:last-child{margin-bottom:0}
    .email-editor a{color:#FF6600}
    .review-footer{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #eee;padding:16px 36px;display:flex;align-items:center;gap:14px;box-shadow:0 -2px 12px rgba(0,0,0,.06);z-index:10}
    .send-log{font-size:12px;line-height:1.8;padding:12px;background:#f7f7f7;border-radius:8px;max-height:140px;overflow-y:auto;white-space:pre-wrap;margin:12px 24px 0}
    .log-ok{color:#1a7a3b;font-weight:700;display:block}
    .log-err{color:#c53030;font-weight:700;display:block}
  </style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">Alibaba.com</div>
    <div class="pw-sub">랜딩페이지 관리자</div>
    <input class="pw-input" type="password" id="pw-inp" placeholder="••••" maxlength="6">
    <button class="pw-btn" onclick="checkPw()">로그인</button>
    <div class="pw-err" id="pw-err"></div>
  </div>
</div>

<div id="admin">
  <nav class="adm-nav">
    <div class="adm-logo">Alibaba Landing · Manager</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('sections',this)">섹션 관리</button>
      <button class="nav-tab" onclick="switchTab('text',this)">페이지 문구</button>
      <button class="nav-tab" onclick="switchTab('email',this)">이메일 발송</button>
    </div>
    <button class="adm-logout" onclick="logout()">로그아웃</button>
  </nav>

  <div class="adm-body">
    <!-- SECTIONS -->
    <div class="panel active" id="panel-sections">
      <div class="sec-title">카테고리별 섹션 설정 <span class="cnt-badge" id="cat-cnt">—</span></div>
      <div id="cat-list"></div>
      <div class="add-row">
        <input class="add-inp" id="new-cat" type="text" placeholder="새 카테고리 (예: 전자제품)">
        <button class="add-btn" onclick="addCat()">+ 추가</button>
      </div>
    </div>

    <!-- TEXT -->
    <div class="panel" id="panel-text">
      <div class="sec-title">공통 페이지 문구 편집</div>
      <div id="txt-fields"></div>
      <div class="txt-save-row">
        <button class="save-btn" onclick="saveTxt()">저장</button>
        <span class="saved-msg" id="txt-saved">저장 완료 ✓</span>
        <button onclick="resetTxt()" style="margin-left:auto;background:none;border:1px solid #eee;color:#aaa;border-radius:8px;padding:9px 16px;font-size:12px;cursor:pointer;font-family:inherit">기본값 복원</button>
      </div>
    </div>

    <!-- EMAIL -->
    <div class="panel" id="panel-email">
      <div class="sec-title">이메일 발송</div>
      <div class="toolbar">
        <button class="tb-btn" id="btn-load" onclick="loadLeads()">리드 불러오기</button>
        <button class="tb-btn orange" id="btn-review" onclick="goReview()" disabled>발송 검수 →</button>
        <span class="status-txt" id="lead-status"></span>
      </div>
      <div class="filter-area" id="filter-area" style="display:none">
        <div class="filter-row">
          <span class="filter-label">카테고리</span>
          <div class="quick-btns">
            <button class="quick-btn accent" onclick="selectDataCats()">✓ 데이터 완성만</button>
            <button class="quick-btn" onclick="selectAllCats()">전체 선택</button>
            <button class="quick-btn" onclick="clearCats()">전체 해제</button>
          </div>
          <div id="cat-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;width:100%"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">발송여부</span>
          <div style="display:flex;gap:6px">
            <span class="fchip on" id="fs-all" onclick="setSentFilter('')">전체</span>
            <span class="fchip" id="fs-n" onclick="setSentFilter('n')">미발송</span>
            <span class="fchip" id="fs-y" onclick="setSentFilter('y')">발송완료</span>
          </div>
        </div>
      </div>
      <div class="lead-table-wrap" style="overflow-x:auto">
        <table class="leads">
          <thead><tr>
            <th><input type="checkbox" id="chk-all" onchange="toggleAll(this)"></th>
            <th>기업명</th><th>담당자</th><th>이메일</th><th>카테고리</th><th>상태</th><th>발송여부</th>
          </tr></thead>
          <tbody id="lead-tbody"><tr><td colspan="7" style="text-align:center;padding:40px;color:#bbb;font-size:13px">리드 불러오기를 눌러주세요</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- REVIEW SCREEN -->
<div id="review-screen">
  <nav class="review-nav">
    <button onclick="closeReview()" style="background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;font-family:inherit">← 목록으로</button>
    <span style="color:white;font-weight:700;font-size:15px;flex:1" id="review-title">발송 검수</span>
    <button class="tb-btn" style="font-size:12px;padding:7px 14px" onclick="toggleAllReview(true)">전체 선택</button>
    <button class="tb-btn" style="font-size:12px;padding:7px 14px;background:#555" onclick="toggleAllReview(false)">전체 해제</button>
  </nav>
  <div class="review-body">
    <!-- 공통 추가 설정 -->
    <div class="common-panel" id="common-panel">
      <div class="common-panel-hd" onclick="this.parentElement.classList.toggle('open')">
        <span>📌 공통 추가 설정</span>
        <span class="badge-opt">선택사항 — 모든 이메일에 공통 적용</span>
        <span class="cp-arrow">▼</span>
      </div>
      <div class="common-panel-body">
        <div class="rf-lbl" style="margin-bottom:8px">추가 안내 문구 <span style="font-weight:400;color:#ccc;text-transform:none;letter-spacing:0;font-size:10px">"긴 글 읽어주셔서..." 바로 위에 삽입</span></div>
        <div class="editor-toolbar">
          <button onmousedown="event.preventDefault();document.execCommand('bold')" title="볼드"><b>B</b></button>
          <button onmousedown="event.preventDefault();document.execCommand('italic')" title="이탤릭"><i>I</i></button>
          <button onmousedown="event.preventDefault();document.execCommand('underline')" title="밑줄"><u>U</u></button>
          <button class="link-btn" onmousedown="event.preventDefault();insertLinkExtra()" title="링크 삽입">🔗 링크</button>
          <button onmousedown="event.preventDefault();document.execCommand('removeFormat')" style="font-size:11px;width:auto;padding:0 8px" title="서식 제거">제거</button>
        </div>
        <div class="email-editor" id="extra-text" contenteditable="true" style="min-height:80px" placeholder="예: 5월 28일(수) 오전 11시 알리바바닷컴 세미나를 진행합니다. 참석을 희망하시면 아래 링크에서 사전 등록해 주세요."></div>
        <div class="attach-row">
          <span class="attach-lbl">📎 첨부파일</span>
          <button class="attach-trigger" onclick="document.getElementById('attach-input').click()">파일 선택</button>
          <input class="attach-input" type="file" id="attach-input" onchange="onAttachChange(this)">
          <span class="attach-name" id="attach-name">선택된 파일 없음</span>
          <button class="attach-clear" id="attach-clear" onclick="clearAttach()" style="display:none">✕</button>
        </div>
      </div>
    </div>
    <div id="review-list"></div>
    <div id="send-log" style="display:none"></div>
  </div>
  <div class="review-footer">
    <span style="font-size:13px;color:#888;flex:1" id="review-sel-cnt"></span>
    <button class="tb-btn orange" id="btn-final-send" onclick="doSend()">최종 발송</button>
    <button class="tb-btn" style="background:#888" onclick="closeReview()">취소</button>
  </div>
</div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbx6GrFoJdEXqfcbVP0NJ4H8VO-WjSFFWv2-9BgQSYxHe2ByvXH1TAh9t_Q6n7cx9MkVvQ/exec';
const LANDING  = 'https://parkyttty.github.io/alibaba-landing/';
const LOCAL_SV = 'http://localhost:3737';
const PW       = '6420';
const LS_CFG   = 'alb_section_cfg';
const LS_CATS  = 'alb_cats';
const LS_TXT   = 'alb_text_cfg';
const DEF_CATS = ['뷰티', '식음료', '의류 및 잡화', '가구'];

const SECTIONS = [
  {key:'global_header',   label:'섹션 헤더 (GLOBAL RFQ)',      grp:'GLOBAL RFQ', isHeader:true},
  {key:'global_countries',label:'바이어 수요 국가 TOP 5',       grp:'GLOBAL RFQ'},
  {key:'global_subcate',  label:'글로벌 인기 서브카테고리',     grp:'GLOBAL RFQ'},
  {key:'global_kw',       label:'글로벌 인기 검색 키워드',     grp:'GLOBAL RFQ'},
  {key:'kr_header',       label:'섹션 헤더 (KR SELLER)',        grp:'KR SELLER', isHeader:true},
  {key:'kr_countries',    label:'한국 셀러 바이어 분포 TOP 5',  grp:'KR SELLER'},
  {key:'kr_traffic',      label:'트래픽 지표',                  grp:'KR SELLER'},
  {key:'kr_subcate',      label:'한국 셀러 인기 서브카테고리',  grp:'KR SELLER'},
  {key:'kr_kw',           label:'한국 셀러 인기 검색어',       grp:'KR SELLER'},
];

const TXT_FIELDS = [
  {key:'hero_title',  label:'히어로 타이틀',   def:'Go Global.\nGo Alibaba.com.', rows:2},
  {key:'hero_sub1',   label:'서브타이틀 1행',  def:'글로벌 수출, 지금 바로 시작할 수 있습니다.', rows:1},
  {key:'hero_sub2',   label:'서브타이틀 2행',  def:'5,000만 명의 바이어가 기다리는 세계 최대 B2B 플랫폼', rows:1},
  {key:'cta_tagline', label:'CTA 서브문구',    def:'알리바바닷컴과 함께 글로벌 시장에서 새로운 기회를 만드세요.', rows:1},
  {key:'am_name',     label:'AM 이름',         def:'박영운 (Alibaba.com Account Manager)', rows:1},
  {key:'am_title',    label:'AM 직책',         def:'알리바바닷컴 코리아 · Global Supplier Development Department', rows:1},
];

// ── Auth ──────────────────────────────────────────────
function checkPw() {
  if (document.getElementById('pw-inp').value === PW) {
    sessionStorage.setItem('alb_mgr_auth', '1'); showAdmin();
  } else {
    document.getElementById('pw-err').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-inp').value = '';
  }
}
document.getElementById('pw-inp').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
function logout() { sessionStorage.removeItem('alb_mgr_auth'); location.reload(); }

// ── State ─────────────────────────────────────────────
let cats=[], cfg={}, txtCfg={}, catStatus={}, leads=[], filteredLeads=[], reviewLeads=[];
function loadState() {
  try { cfg    = JSON.parse(localStorage.getItem(LS_CFG)  || '{}'); } catch(e) { cfg={}; }
  try { cats   = JSON.parse(localStorage.getItem(LS_CATS) || JSON.stringify(DEF_CATS)); } catch(e) { cats=[...DEF_CATS]; }
  try { txtCfg = JSON.parse(localStorage.getItem(LS_TXT)  || '{}'); } catch(e) { txtCfg={}; }
}
function saveState() {
  localStorage.setItem(LS_CFG, JSON.stringify(cfg));
  localStorage.setItem(LS_CATS, JSON.stringify(cats));
}
function secOn(cat, key) { return !cfg[cat] || cfg[cat][key] !== false; }
function setSecOn(cat, key, val) { if (!cfg[cat]) cfg[cat]={}; cfg[cat][key]=val; }

function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── Sections panel ────────────────────────────────────
function renderCats() {
  const list = document.getElementById('cat-list');
  document.getElementById('cat-cnt').textContent = cats.length+'개';
  list.innerHTML = '';
  cats.forEach((cat, idx) => {
    const grps = {};
    SECTIONS.forEach(s => { if (!grps[s.grp]) grps[s.grp]=[]; grps[s.grp].push(s); });
    const grpHtml = Object.entries(grps).map(([g, secs]) => `
      <div class="grp-lbl">${g}</div>
      <div class="tog-rows">${secs.map(s=>`
        <div class="tog-row${s.isHeader?' header-row':''}">
          <span class="tog-nm">${s.label}</span>
          <label class="switch">
            <input type="checkbox" data-cat="${cat}" data-key="${s.key}" ${secOn(cat,s.key)?'checked':''} onchange="onTog(this)">
            <span class="sw-sl"></span>
          </label>
        </div>`).join('')}
      </div>`).join('');

    const st = catStatus[cat];
    const badge = st===undefined ? `<span class="badge badge-chk">확인 중...</span>`
      : st ? `<span class="badge badge-ok">데이터 있음</span>` : `<span class="badge badge-no">데이터 없음</span>`;
    const isCustom = idx >= DEF_CATS.length;

    const div = document.createElement('div');
    div.className='card'; div.id='card-'+cat;
    div.innerHTML=`
      <div class="cat-hd" onclick="this.parentElement.classList.toggle('open')">
        <span class="cat-nm">${cat}</span>${badge}
        <a class="preview-a" href="${LANDING}?category=${encodeURIComponent(cat)}" target="_blank" onclick="event.stopPropagation()">미리보기 →</a>
        <span class="cat-arrow">▼</span>
      </div>
      <div class="cat-body">${grpHtml}
        <div class="save-row">
          <button class="save-btn" onclick="saveCat('${cat}')">저장</button>
          <span class="saved-msg" id="msg-${cat}">저장 완료 ✓</span>
          <button class="update-btn" id="upd-${cat}" onclick="updateCatData('${cat}')">데이터 업데이트</button>
          ${isCustom?`<button class="del-btn" onclick="event.stopPropagation();deleteCat('${cat}')">삭제</button>`:''}
        </div>
        <div class="update-log" id="upd-log-${cat}"></div>
      </div>`;
    list.appendChild(div);
  });
}

function onTog(cb) { setSecOn(cb.dataset.cat, cb.dataset.key, cb.checked); }
function saveCat(cat) {
  saveState();
  const msg=document.getElementById('msg-'+cat);
  msg.style.display='inline'; setTimeout(()=>msg.style.display='none', 2000);
}
function addCat() {
  const inp=document.getElementById('new-cat');
  const v=inp.value.trim();
  if (!v||cats.includes(v)) { inp.focus(); return; }
  cats.push(v); saveState(); inp.value='';
  renderCats(); checkStatus([v]);
}
function deleteCat(cat) {
  if (!confirm(cat+' 카테고리를 삭제하시겠습니까?')) return;
  cats=cats.filter(c=>c!==cat); delete cfg[cat]; saveState(); renderCats();
}

async function checkStatus(targets) {
  await Promise.all((targets||cats).map(async cat => {
    catStatus[cat]=undefined;
    const card=document.getElementById('card-'+cat);
    if (card) { const b=card.querySelector('.badge'); if(b){b.className='badge badge-chk';b.textContent='확인 중...';} }
    try {
      const r=await fetch(GAS_URL+'?format=json&category='+encodeURIComponent(cat));
      const d=await r.json();
      catStatus[cat]=!!(d&&d.rfq_count&&d.rfq_count!=='—');
    } catch(e) { catStatus[cat]=false; }
    const c2=document.getElementById('card-'+cat);
    if (c2) { const b=c2.querySelector('.badge'); if(b){b.className=catStatus[cat]?'badge badge-ok':'badge badge-no';b.textContent=catStatus[cat]?'데이터 있음':'데이터 없음';} }
  }));
}

async function updateCatData(cat) {
  const btn=document.getElementById('upd-'+cat);
  const log=document.getElementById('upd-log-'+cat);
  btn.disabled=true; btn.textContent='업데이트 중...';
  log.style.display='block'; log.textContent='localhost:3737에 요청 중... (1~2분 소요)';
  try {
    const r=await fetch(LOCAL_SV+'/admin/update-data', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({category:cat})
    });
    if (!r.ok) throw new Error('서버 오류 '+r.status);
    const d=await r.json();
    if (d.ok) {
      log.textContent='✓ 완료: '+d.message;
      catStatus[cat]=true;
      const c=document.getElementById('card-'+cat);
      if (c) { const b=c.querySelector('.badge'); if(b){b.className='badge badge-ok';b.textContent='데이터 있음';} }
    } else {
      log.textContent='오류: '+(d.error||'알 수 없는 오류');
    }
  } catch(e) {
    log.textContent='오류: '+e.message+' (server.js 실행 중인지 확인)';
  }
  btn.disabled=false; btn.textContent='데이터 업데이트';
}

// ── Text panel ────────────────────────────────────────
function renderTxtPanel() {
  document.getElementById('txt-fields').innerHTML = TXT_FIELDS.map(f=>`
    <div class="txt-field">
      <div class="txt-lbl">${f.label}</div>
      <textarea class="txt-inp" id="tf-${f.key}" rows="${f.rows}" placeholder="${f.def}">${txtCfg[f.key]||''}</textarea>
      <div class="txt-default">기본값: ${f.def.length>70?f.def.slice(0,70)+'...':f.def}</div>
    </div>`).join('');
}
function saveTxt() {
  TXT_FIELDS.forEach(f=>{
    const v=document.getElementById('tf-'+f.key).value.trim();
    if (v) txtCfg[f.key]=v; else delete txtCfg[f.key];
  });
  localStorage.setItem(LS_TXT, JSON.stringify(txtCfg));
  const msg=document.getElementById('txt-saved');
  msg.style.display='inline'; setTimeout(()=>msg.style.display='none', 2000);
}
function resetTxt() {
  if (!confirm('모든 문구를 기본값으로 되돌리겠습니까?')) return;
  txtCfg={}; localStorage.removeItem(LS_TXT);
  TXT_FIELDS.forEach(f=>{ document.getElementById('tf-'+f.key).value=''; });
}

// ── Email panel ───────────────────────────────────────
async function loadLeads() {
  const btn=document.getElementById('btn-load');
  const st=document.getElementById('lead-status');
  btn.disabled=true; btn.textContent='불러오는 중...';
  st.textContent='localhost:3737 요청 중... (30~60초 소요)';
  try {
    const r=await fetch(LOCAL_SV+'/admin/leads');
    if (!r.ok) throw new Error('서버 오류 '+r.status);
    const d=await r.json();
    if (!d.ok) throw new Error(d.error||'알 수 없는 오류');
    leads=d.data||[]; st.textContent=leads.length+'개 로드됨';
    buildCatFilter(); applyFilter();
  } catch(e) {
    st.textContent='오류: '+e.message+' (server.js 실행 중인지 확인)';
  }
  btn.disabled=false; btn.textContent='리드 불러오기';
}
let selectedCats=new Set();  // 빈 Set = 전체
let sentFilter='';

function buildCatFilter() {
  const cts=[...new Set(leads.map(l=>l.category).filter(Boolean))];
  // 리드에 있는 카테고리만 초기 전체 선택
  selectedCats=new Set(cts);
  renderCatChips(cts);
  document.getElementById('filter-area').style.display='block';
}

function renderCatChips(cts) {
  const ctsToUse=cts||[...new Set(leads.map(l=>l.category).filter(Boolean))];
  const wrap=document.getElementById('cat-chips');
  const counts={};
  leads.forEach(l=>{if(l.category) counts[l.category]=(counts[l.category]||0)+1;});
  wrap.innerHTML=ctsToUse.map(c=>`
    <span class="fchip ${selectedCats.has(c)?'on':''}" onclick="toggleCat('${c}')" id="fchip-${c.replace(/\s/g,'_')}">
      ${c} <span class="cnt">${counts[c]||0}</span>
    </span>`).join('');
}

function toggleCat(cat) {
  if (selectedCats.has(cat)) selectedCats.delete(cat); else selectedCats.add(cat);
  updateChipUi(); applyFilter();
}
function selectAllCats() {
  const cts=[...new Set(leads.map(l=>l.category).filter(Boolean))];
  selectedCats=new Set(cts); updateChipUi(); applyFilter();
}
function clearCats() { selectedCats=new Set(); updateChipUi(); applyFilter(); }
function selectDataCats() {
  const cts=[...new Set(leads.map(l=>l.category).filter(Boolean))];
  selectedCats=new Set(cts.filter(c=>catStatus[c]===true));
  updateChipUi(); applyFilter();
}
function updateChipUi() {
  const cts=[...new Set(leads.map(l=>l.category).filter(Boolean))];
  cts.forEach(c=>{
    const el=document.getElementById('fchip-'+c.replace(/\s/g,'_'));
    if (el) el.className='fchip'+(selectedCats.has(c)?' on':'');
  });
}
function setSentFilter(v) {
  sentFilter=v;
  ['all','n','y'].forEach(k=>document.getElementById('fs-'+k).classList.remove('on'));
  document.getElementById('fs-'+(v||'all')).classList.add('on');
  applyFilter();
}
function applyFilter() {
  filteredLeads=leads.filter(l=>{
    if (selectedCats.size>0&&!selectedCats.has(l.category)) return false;
    if (sentFilter==='y'&&!l.sentAt) return false;
    if (sentFilter==='n'&&l.sentAt) return false;
    return true;
  });
  renderLeads();
}
function renderLeads() {
  const tbody=document.getElementById('lead-tbody');
  if (!filteredLeads.length) {
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:36px;color:#bbb;font-size:13px">해당 리드 없음</td></tr>'; return;
  }
  tbody.innerHTML=filteredLeads.map((l,i)=>`
    <tr>
      <td><input type="checkbox" class="row-chk" data-idx="${i}" onchange="updateReviewBtn()"></td>
      <td style="font-weight:700">${l.company||'—'}</td>
      <td>${l.name||'—'}</td>
      <td style="color:#FF6600">${l.email||'—'}</td>
      <td><span class="cat-chip">${l.category||'—'}</span></td>
      <td>${l.status||'—'}</td>
      <td><span class="sent-badge ${l.sentAt?'sent-y':'sent-n'}">${l.sentAt?'발송완료':'미발송'}</span></td>
    </tr>`).join('');
  document.getElementById('chk-all').checked=false;
  updateReviewBtn();
}
function toggleAll(cb) {
  document.querySelectorAll('.row-chk').forEach(c=>c.checked=cb.checked); updateReviewBtn();
}
function updateReviewBtn() {
  const cnt=document.querySelectorAll('.row-chk:checked').length;
  const btn=document.getElementById('btn-review');
  btn.disabled=cnt===0;
  btn.textContent=cnt>0?`발송 검수 (${cnt}건) →`:'발송 검수 →';
}
function getSelected() {
  return [...document.querySelectorAll('.row-chk:checked')]
    .map(c=>filteredLeads[parseInt(c.dataset.idx)]).filter(l=>l&&l.email);
}

// ── Email helpers ─────────────────────────────────────
function buildSubject(l) { return `[${l.company}] ${l.category||''} 카테고리 글로벌 바이어 수요 동향 리포트 공유의 건 (알리바바닷컴)`; }
function buildUtmUrl(l) {
  const cat = l.category||'';
  const campaign = cat==='뷰티' ? 'kbeauty_2026' : cat==='식음료' ? 'krfood_2026' : cat==='의류 및 잡화' ? 'krfashion_2026' : cat==='가구' ? 'krfurniture_2026' : 'kr_export_2026';
  return `${LANDING}?category=${encodeURIComponent(cat)}&utm_source=email&utm_medium=outbound&utm_campaign=${campaign}&utm_content=${encodeURIComponent(l.crmId||'')}`;
}
function buildBody(l) {
  const cat = l.category||'';
  const url = buildUtmUrl(l);
  return `<p>안녕하십니까.<br>알리바바닷컴 코리아 박영운 시니어 매니저입니다.</p>
<p>최근 알리바바닷컴 내 ${cat} 카테고리에서 <strong>한국산 제품을 찾는 글로벌 바이어들의 소싱 수요가 빠르게 높아지고 있어</strong> 연락드립니다.</p>
<p>${l.company}의 제품과 관련하여, 지난 일주일 사이 당사 플랫폼을 통해 바이어들이 실제 구매 요청을 주셨던 <strong>제품 데이터와 수요 동향을 정리한 리포트를 공유드립니다.</strong></p>
<p>▶ <a href="${url}" target="_blank">${cat} 카테고리 수요 동향 리포트 확인하기</a></p>
<p>리포트 검토 후, ${l.company}의 구체적인 시장 수요와 알리바바닷컴 내 진출 기회에 대해 직접 말씀드리고 싶습니다. <strong>30분 내외의 미팅을 요청드리고 싶습니다.</strong></p>
<p>편하신 일정 말씀주시면 확인 후 빠르게 회신 드리겠습니다.</p>
<p>긴 글 읽어주셔서 감사드리고, 평안한 하루 되시길 바랍니다.</p>`;
}

// ── Link / Attach helpers ─────────────────────────────
function insertLink() {
  const url=prompt('링크 URL 입력:', 'https://');
  if (url) document.execCommand('createLink', false, url);
}
function insertLinkExtra() {
  const el=document.getElementById('extra-text');
  el.focus();
  const url=prompt('링크 URL 입력:', 'https://');
  if (url) document.execCommand('createLink', false, url);
}
function onAttachChange(inp) {
  if (inp.files.length>0) {
    document.getElementById('attach-name').textContent=inp.files[0].name;
    document.getElementById('attach-clear').style.display='inline';
  }
}
function clearAttach() {
  document.getElementById('attach-input').value='';
  document.getElementById('attach-name').textContent='선택된 파일 없음';
  document.getElementById('attach-clear').style.display='none';
}

// ── Review screen ─────────────────────────────────────
function goReview() {
  reviewLeads=getSelected();
  if (!reviewLeads.length) return;
  document.getElementById('review-title').textContent=`발송 검수 — ${reviewLeads.length}건`;
  document.getElementById('send-log').style.display='none';
  document.getElementById('send-log').innerHTML='';
  document.getElementById('btn-final-send').disabled=false;
  document.getElementById('btn-final-send').textContent='최종 발송';
  // 공통 설정 초기화
  document.getElementById('extra-text').innerHTML='';
  document.getElementById('common-panel').classList.remove('open');
  clearAttach();

  document.getElementById('review-list').innerHTML=reviewLeads.map((l,i)=>`
    <div class="review-card" id="rc-${i}">
      <div class="review-card-hd" onclick="this.parentElement.classList.toggle('open')">
        <label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" class="rv-chk" data-idx="${i}" checked onchange="updateFinalCnt()">
        </label>
        <span class="review-card-idx">${i+1}</span>
        <span class="review-card-co">${l.company}</span>
        <span class="review-card-email">${l.email}</span>
        <span class="cat-chip">${l.category||''}</span>
        <span class="rv-arrow">▼</span>
      </div>
      <div class="review-card-body">
        <div class="rf-row"><div class="rf-lbl">받는 사람</div><div class="rf-val">${l.company} &lt;${l.email}&gt;</div></div>
        <div class="rf-row"><div class="rf-lbl">제목</div><div class="rf-val subj">${buildSubject(l)}</div></div>
        <div class="rf-row"><div class="rf-lbl">발송 링크 (UTM)</div><div class="rf-val link">${buildUtmUrl(l)}</div></div>
        <div class="rf-row">
          <div class="rf-lbl">본문 <span style="font-weight:400;color:#ccc;text-transform:none;letter-spacing:0;font-size:10px">직접 편집 가능</span></div>
          <div class="editor-toolbar">
            <button onmousedown="event.preventDefault();document.execCommand('bold')" title="볼드"><b>B</b></button>
            <button onmousedown="event.preventDefault();document.execCommand('italic')" title="이탤릭"><i>I</i></button>
            <button onmousedown="event.preventDefault();document.execCommand('underline')" title="밑줄"><u>U</u></button>
            <button class="link-btn" onmousedown="event.preventDefault();insertLink()" title="링크 삽입">🔗 링크</button>
            <button onmousedown="event.preventDefault();document.execCommand('removeFormat')" title="서식 제거" style="font-size:11px;width:auto;padding:0 8px">제거</button>
          </div>
          <div class="email-editor" id="body-${i}" contenteditable="true">${buildBody(l)}</div>
          <div style="margin-top:10px;padding:10px 12px;background:#f7f7f7;border-radius:6px;border:1px solid #eee">
            <img src="https://parkyttty.github.io/alibaba-landing/signature.png" width="172" height="55" alt="서명" style="display:block;opacity:.7">
          </div>
        </div>
      </div>
    </div>`).join('');

  updateFinalCnt();
  document.getElementById('review-screen').style.display='block';
  window.scrollTo(0,0);
}
function closeReview() { document.getElementById('review-screen').style.display='none'; }
function toggleAllReview(v) { document.querySelectorAll('.rv-chk').forEach(c=>c.checked=v); updateFinalCnt(); }
function updateFinalCnt() {
  const cnt=document.querySelectorAll('.rv-chk:checked').length;
  document.getElementById('review-sel-cnt').textContent=`${cnt}건 선택됨`;
  const btn=document.getElementById('btn-final-send');
  btn.textContent=cnt>0?`최종 발송 (${cnt}건)`:'최종 발송';
  btn.disabled=cnt===0;
}

async function doSend() {
  const selected=[...document.querySelectorAll('.rv-chk:checked')]
    .map(c=>reviewLeads[parseInt(c.dataset.idx)]).filter(Boolean);
  if (!selected.length) return;

  const btn=document.getElementById('btn-final-send');
  const log=document.getElementById('send-log');
  btn.disabled=true; btn.textContent='발송 중...';
  log.style.display='block'; log.innerHTML='<span>서버에 요청 중...</span>';

  const SIG='<br><img src="https://parkyttty.github.io/alibaba-landing/signature.png" width="344" height="110" alt="박영운 서명">';

  // 추가 문구
  const extraEl=document.getElementById('extra-text');
  const extraHtml=(extraEl?extraEl.innerHTML.trim():'').replace(/^<br>$/,'');

  // 첨부파일
  const attachInput=document.getElementById('attach-input');
  let attachData=null;
  if (attachInput&&attachInput.files.length>0) {
    const file=attachInput.files[0];
    attachData=await new Promise(res=>{
      const r2=new FileReader();
      r2.onload=e=>res({name:file.name,type:file.type,b64:e.target.result.split(',')[1]});
      r2.readAsDataURL(file);
    });
  }

  const emails=[...document.querySelectorAll('.rv-chk:checked')].map(c=>{
    const idx=parseInt(c.dataset.idx);
    const l=reviewLeads[idx];
    const editor=document.getElementById('body-'+idx);
    let body=editor?editor.innerHTML:buildBody(l);
    // 추가 문구 삽입 (긴 글 읽어주셔서... 바로 위)
    if (extraHtml) {
      const marker='긴 글 읽어주셔서';
      const pos=body.indexOf(marker);
      const pStart=pos!==-1?body.lastIndexOf('<p>',pos):body.length;
      body=body.slice(0,pStart)+`<p>${extraHtml}</p>`+body.slice(pStart);
    }
    body+=SIG;
    return {to:l.email,company:l.company,subject:buildSubject(l),body,crmId:l.crmId||''};
  }).filter(e=>e.to);

  try {
    const r=await fetch(LOCAL_SV+'/admin/send-emails',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({emails,sig:SIG,attach:attachData})
    });
    if (!r.ok) throw new Error('서버 오류 '+r.status);
    const result=await r.json();
    log.innerHTML='';
    (result.log||[]).forEach(e=>{
      const span=document.createElement('span');
      span.className=e.ok?'log-ok':'log-err';
      span.textContent=e.ok?`✓ 발송 완료: ${e.to}`:`✗ 실패: ${e.to} — ${e.error||''}`;
      log.appendChild(span);
    });
    const ok=(result.log||[]).filter(e=>e.ok).length;
    btn.textContent=`완료 (${ok}/${selected.length})`;
  } catch(e) {
    log.innerHTML='<span class="log-err">오류: '+e.message+'</span>';
    btn.disabled=false; btn.textContent='재시도';
  }
}

// ── Init ──────────────────────────────────────────────
function showAdmin() {
  document.getElementById('pw-screen').style.display='none';
  document.getElementById('admin').style.display='block';
  loadState(); renderCats(); renderTxtPanel(); checkStatus();
}
if (sessionStorage.getItem('alb_mgr_auth')==='1') showAdmin();
